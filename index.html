<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
    background: #0B1220;
    background-image:
      radial-gradient(1200px 600px at 0% -10%, rgba(37,99,235,0.18), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(168,85,247,0.14), transparent 60%),
      radial-gradient(800px 700px at 50% 100%, rgba(14,165,233,0.12), transparent 60%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    color: #fff;
    overflow: hidden;
  }
  #root { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  #root > * { transform: scale(min(1, calc((100vh - 40px) / 900))); transform-origin: center center; }

  /* ───── Mobile: fill screen, drop the device bezel ───── */
  @media (max-width: 480px) {
    html, body {
      background: #F2F2F7;
      background-image: none;
      overscroll-behavior: none;
    }
    #root {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
    }
    #root > * { transform: none !important; }
    .ios-device {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    /* Hide simulator chrome on real devices — OS already shows status bar + gesture bar */
    .ios-device-island,
    .ios-device-statusbar,
    .ios-device-home,
    .ios-statusbar { display: none !important; }
    /* Tweaks panel is a desktop dev tool */
    .twk-panel { display: none !important; }
    /* Trim top padding that was reserved for the (now-hidden) fake status bar */
    .screen-hero { padding-top: 16px !important; }
  }

  /* hide scrollbars inside screens but keep scrollable */
  .scroll-area { scrollbar-width: none; }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* shared phone-screen frame label outside */
  .stage-label {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.5); font-weight: 600; pointer-events: none;
  }
  .stage-hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.04em;
    color: rgba(255,255,255,0.35); font-weight: 500; pointer-events: none;
    text-align: center;
  }

  /* tap feedback for interactive elements */
  .tap { transition: transform .12s ease, opacity .12s ease, background .15s ease; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .tap:active { transform: scale(0.97); opacity: 0.85; }
  .tap:focus, .tap:focus-visible { outline: none; }
  button, a { -webkit-tap-highlight-color: transparent; }

  /* page transitions */
  @keyframes slideInRight { from { transform: translateX(100%); opacity: 0.6; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideInLeft { from { transform: translateX(-30%); opacity: 0.6; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .anim-slide-in { animation: slideInRight .26s cubic-bezier(.2,.7,.2,1); }
  .anim-back { animation: slideInLeft .26s cubic-bezier(.2,.7,.2,1); }
  .anim-fade { animation: fadeIn .3s ease-out; }
  .anim-scale { animation: scaleIn .35s cubic-bezier(.2,.7,.2,1); }
  .anim-slide-up { animation: slideUp .35s cubic-bezier(.2,.7,.2,1); }

  /* toast */
  @keyframes toastIn { 0% { transform: translate(-50%, 20px); opacity: 0; } 15% { transform: translate(-50%, 0); opacity: 1; } 85% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -10px); opacity: 0; } }
  .toast { animation: toastIn 2.6s ease forwards; }

  /* shimmer (loading qr) */
  @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }

  /* spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }

  /* tab indicator */
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  button { font-family: inherit; }
  input, textarea { font-family: inherit; }
</style>
